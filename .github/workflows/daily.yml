name: Fetch & publish NSE bhavcopy

on:
  schedule:
    # 11:00 UTC = 4:30 PM IST — 60 min after NSE market close
    - cron: "0 11 * * 1-5"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit data.json back to the repo

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch bhavcopy & generate data.json
        run: python fetch_and_process.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update bhavcopy data $(date +'%Y-%m-%d')"
          git push
